services:
  - type: web
    name: agrisense-rag
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: RAG_DATA_DIR
        value: ./storage
      - key: RAG_VECTORSTORE_DIR
        value: ./storage/faiss_index
      - key: RAG_OCR_OUTPUT
        value: ./storage/ocr_pages.jsonl
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-large

